<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Dashboard & Editor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { 
            --bg: #0f0f0f; 
            --card: #1a1a1a; 
            --card-hover: #222222;
            --accent: #ffffff; 
            --grey: #888; 
            --dark-grey: #333;
            --red: #ff4d4d; 
            --green: #00e676; 
            --border-radius: 8px;
        }
        body { background: var(--bg); color: var(--accent); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; }
        .header { text-align: center; border-bottom: 1px solid var(--dark-grey); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { font-weight: 300; letter-spacing: 3px; margin: 0; font-size: 1.5rem; }
        
        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: var(--card); border: 1px solid var(--dark-grey); color: var(--grey); border-radius: var(--border-radius); cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .tab-btn.active { border-color: var(--accent); color: #fff; background: var(--card-hover); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Статистика */
        .brew-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--grey); }
        .brew-card.Completed { border-left-color: var(--green); }
        .brew-card.Abandoned { border-left-color: var(--red); }
        .brew-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        .brew-details { font-size: 0.9rem; color: var(--grey); display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .status { font-size: 0.75rem; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; background: var(--dark-grey); color: #fff; font-weight: normal; }

        /* Редактор (GUI) */
        .path-container { display: flex; gap: 10px; margin-bottom: 20px; }
        select.recipe-selector { 
            flex: 1; padding: 12px 15px; background-color: var(--card); color: #fff; 
            border: 1px solid var(--dark-grey); border-radius: var(--border-radius); font-size: 1rem; cursor: pointer;
            appearance: none; -webkit-appearance: none; -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto;
        }
        select.recipe-selector:focus { border-color: var(--accent); outline: none; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--grey); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .form-control { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--dark-grey); color: #fff; border-radius: var(--border-radius); box-sizing: border-box; font-size: 1rem; }
        .form-control:focus { border-color: var(--accent); outline: none; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* Вливания */
        .steps-header { margin-top: 25px; margin-bottom: 10px; border-bottom: 1px solid var(--dark-grey); padding-bottom: 10px; color: var(--accent); }
        .steps-header h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .step-row { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 10px; background: var(--card); padding: 10px; border-radius: var(--border-radius); margin-bottom: 10px; align-items: center; border: 1px solid var(--dark-grey); }
        .step-row input { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--dark-grey); color: #fff; border-radius: 4px; box-sizing: border-box; text-align: center; font-size: 0.9rem; }
        .step-row input:focus { border-color: var(--accent); outline: none; }
        
        /* Блок ввода минут и секунд */
        .time-inputs { display: flex; gap: 5px; align-items: center; }
        .time-separator { font-weight: bold; color: var(--grey); }

        /* Кнопки */
        .btn { padding: 12px 15px; border: none; border-radius: var(--border-radius); cursor: pointer; transition: 0.2s; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .btn-add { background: #333; color: #fff; width: 100%; margin-bottom: 20px; }
        .btn-add:hover { background: #444; }
        .btn-danger { background: rgba(255, 77, 77, 0.1); color: var(--red); padding: 10px; height: 100%; display: flex; align-items: center; justify-content: center; }
        .btn-danger:hover { background: var(--red); color: #fff; }
        .btn-save { width: 100%; padding: 15px; background: var(--accent); color: #000; font-size: 1.1rem; margin-top: 10px; }
        .btn-save:hover { background: #e0e0e0; }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="header"><h1>NOVA DASHBOARD</h1></div>

<div class="tabs">
    <button class="tab-btn active" onclick="showTab(event, 'stats')">Статистика</button>
    <button class="tab-btn" onclick="showTab(event, 'editor')">Редактор</button>
</div>

<div id="stats" class="section active">
    <div id="totalInfo" style="margin-bottom: 15px; color: var(--grey);">Загрузка данных...</div>
    <div id="historyList"></div>
</div>

<div id="editor" class="section">
    <div class="path-container">
        <select id="dbPath" class="recipe-selector" onchange="loadRecipeToEditor()">
            </select>
    </div>

    <div class="form-group">
        <label>Название рецепта</label>
        <input type="text" id="rec-name" class="form-control" placeholder="Например: Local Kenya">
    </div>
    
    <div class="grid-2">
        <div class="form-group">
            <label>Закладка (грамм)</label>
            <input type="number" id="rec-weight" class="form-control" placeholder="15">
        </div>
        <div class="form-group">
            <label>Помол</label>
            <input type="text" id="rec-grind" class="form-control" placeholder="7.0">
        </div>
    </div>

    <div class="form-group">
        <label>Целевой объем 1 воронки (мл)</label>
        <input type="number" id="rec-volume" class="form-control" placeholder="250">
    </div>

    <div id="wrapper-single" style="display: none;">
        <div class="steps-header"><h3>Вливания</h3></div>
        <div id="steps-container-1"></div>
        <button class="btn btn-add" onclick="addStep(1)">+ Добавить вливание</button>
    </div>

    <div id="wrapper-double" style="display: none;" class="grid-2">
        <div>
            <div class="steps-header"><h3>CH 1 (Левая воронка)</h3></div>
            <div id="steps-container-double-1"></div>
            <button class="btn btn-add" onclick="addStep(1)">+ Добавить (CH 1)</button>
        </div>
        <div>
            <div class="steps-header"><h3>CH 2 (Правая воронка)</h3></div>
            <div id="steps-container-double-2"></div>
            <button class="btn btn-add" onclick="addStep(2)">+ Добавить (CH 2)</button>
        </div>
    </div>

    <button class="btn btn-save" onclick="saveToFirebase()">СОХРАНИТЬ В БАЗУ</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA7qkkjU6_RLZ-Kk80UXNQTuavVAV-fmB8",
        databaseURL: "https://v60-station-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Массивы для хранения шагов (внутри храним startTimeSec, в интерфейсе показываем мм:сс)
    let currentStepsCh1 = [];
    let currentStepsCh2 = [];

    // 1. Генерация выпадающего списка
    function populateDropdown() {
        const select = document.getElementById('dbPath');
        
        const optGroupV60 = document.createElement('optgroup');
        optGroupV60.label = "Одинарный V60";
        for(let i = 0; i < 10; i++) {
            optGroupV60.innerHTML += `<option value="recipes/v60_${i}">recipes/v60_${i}</option>`;
        }
        
        const optGroupDouble = document.createElement('optgroup');
        optGroupDouble.label = "Двойной 2 v 60";
        for(let i = 0; i < 10; i++) {
            optGroupDouble.innerHTML += `<option value="recipes/double_${i}">recipes/double_${i}</option>`;
        }

        select.appendChild(optGroupV60);
        select.appendChild(optGroupDouble);
    }
    populateDropdown();

    // 2. Переключение вкладок
    function showTab(e, tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        e.currentTarget.classList.add('active');
        if(tabId === 'editor') loadRecipeToEditor();
    }

    // 3. ЛОГИКА СТАТИСТИКИ
    db.ref('/history').limitToLast(50).on('value', (snap) => {
        const list = document.getElementById('historyList');
        list.innerHTML = '';
        const data = snap.val();
        if(!data) {
            document.getElementById('totalInfo').innerText = `Нет данных для отображения.`;
            return;
        }

        const items = Object.values(data).reverse();
        document.getElementById('totalInfo').innerText = `Всего варок: ${items.length} (последние 50)`;

        items.forEach(item => {
            const date = new Date(item.timestamp).toLocaleString('ru-RU', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
            const card = document.createElement('div');
            card.className = `brew-card ${item.status}`;
            card.innerHTML = `
                <div class="brew-header">
                    <span>${item.recipe}</span>
                    <span class="status">${item.status === 'Completed' ? 'ОК' : 'СТОП'}</span>
                </div>
                <div class="brew-details">
                    <div>📅 ${date}</div>
                    <div>⏱️ ${item.brew_time_sec} сек</div>
                    <div>💧 Налито: ${item.vol_actual} мл</div>
                    <div>🎯 Цель: ${item.vol_target} мл</div>
                </div>
            `;
            list.appendChild(card);
        });
    });

    // 4. ЛОГИКА РЕДАКТОРА (GUI)
    
    // Синхронизируем значения из Мин:Сек в секунды (startTimeSec)
    function syncStepsFromInputs() {
        const isDouble = document.getElementById('dbPath').value.includes('double');
        
        currentStepsCh1.forEach((step, i) => {
            const containerId = isDouble ? 'double-1' : '1';
            const minInput = document.getElementById(`step-min-1-${containerId}-${i}`);
            const secInput = document.getElementById(`step-sec-1-${containerId}-${i}`);
            const volInput = document.getElementById(`step-vol-1-${containerId}-${i}`);
            
            if (minInput && secInput) {
                let m = parseInt(minInput.value) || 0;
                let s = parseInt(secInput.value) || 0;
                step.startTimeSec = (m * 60) + s;
            }
            if (volInput) step.addVolumeML = parseInt(volInput.value) || 0;
        });

        if (isDouble) {
            currentStepsCh2.forEach((step, i) => {
                const minInput = document.getElementById(`step-min-2-double-2-${i}`);
                const secInput = document.getElementById(`step-sec-2-double-2-${i}`);
                const volInput = document.getElementById(`step-vol-2-double-2-${i}`);
                
                if (minInput && secInput) {
                    let m = parseInt(minInput.value) || 0;
                    let s = parseInt(secInput.value) || 0;
                    step.startTimeSec = (m * 60) + s;
                }
                if (volInput) step.addVolumeML = parseInt(volInput.value) || 0;
            });
        }
    }

    // Отрисовка конкретного массива шагов (переводим секунды в Мин:Сек для верстки)
    function renderStepList(containerId, stepsArray, channelNum) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        
        stepsArray.forEach((step, index) => {
            // Перевод общих секунд в минуты и секунды
            const m = Math.floor(step.startTimeSec / 60);
            const s = step.startTimeSec % 60;

            const row = document.createElement('div');
            row.className = 'step-row';
            row.innerHTML = `
                <div>
                    <label style="font-size:0.65rem; color:var(--grey); margin-bottom:3px; display:block;">Старт (Мин : Сек)</label>
                    <div class="time-inputs">
                        <input type="number" id="step-min-${channelNum}-${containerId.replace('steps-container-', '')}-${index}" value="${m}" min="0">
                        <span class="time-separator">:</span>
                        <input type="number" id="step-sec-${channelNum}-${containerId.replace('steps-container-', '')}-${index}" value="${s}" min="0" max="59">
                    </div>
                </div>
                <div>
                    <label style="font-size:0.65rem; color:var(--grey); margin-bottom:3px; display:block;">Объем (мл)</label>
                    <input type="number" id="step-vol-${channelNum}-${containerId.replace('steps-container-', '')}-${index}" value="${step.addVolumeML}" min="0">
                </div>
                <div style="display:flex; align-items:flex-end;">
                    <button class="btn btn-danger" onclick="removeStep(${channelNum}, ${index})">✕</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    // Главная функция перерисовки
    function renderSteps() {
        const isDouble = document.getElementById('dbPath').value.includes('double');
        
        if (isDouble) {
            document.getElementById('wrapper-single').style.display = 'none';
            document.getElementById('wrapper-double').style.display = 'grid';
            renderStepList('steps-container-double-1', currentStepsCh1, 1);
            renderStepList('steps-container-double-2', currentStepsCh2, 2);
        } else {
            document.getElementById('wrapper-double').style.display = 'none';
            document.getElementById('wrapper-single').style.display = 'block';
            renderStepList('steps-container-1', currentStepsCh1, 1);
        }
    }

    function addStep(channelNum) {
        syncStepsFromInputs();
        let targetArray = channelNum === 1 ? currentStepsCh1 : currentStepsCh2;
        let newTime = 0;
        
        if (targetArray.length > 0) {
            newTime = targetArray[targetArray.length - 1].startTimeSec + 20; 
        }
        
        targetArray.push({ startTimeSec: newTime, addVolumeML: 50 });
        renderSteps();
    }

    function removeStep(channelNum, index) {
        syncStepsFromInputs();
        let targetArray = channelNum === 1 ? currentStepsCh1 : currentStepsCh2;
        targetArray.splice(index, 1);
        renderSteps();
    }

    // Загрузка данных из Firebase
    function loadRecipeToEditor() {
        const path = document.getElementById('dbPath').value;
        const isDouble = path.includes('double');
        
        document.getElementById('rec-name').value = "Загрузка...";
        document.getElementById('rec-weight').value = "";
        document.getElementById('rec-grind').value = "";
        document.getElementById('rec-volume').value = "";
        currentStepsCh1 = [];
        currentStepsCh2 = [];
        renderSteps();

        db.ref(path).once('value').then(s => {
            if (s.exists()) {
                const data = s.val();
                document.getElementById('rec-name').value = data.name || "";
                document.getElementById('rec-weight').value = data.weight || "";
                document.getElementById('rec-grind').value = data.grind || "";
                document.getElementById('rec-volume').value = data.totalVolume || "";
                
                if (data.steps && Array.isArray(data.steps)) {
                    currentStepsCh1 = data.steps.filter(step => step.targetV60 === 1).map(s => ({startTimeSec: s.startTimeSec, addVolumeML: s.addVolumeML}));
                    if (isDouble) {
                        currentStepsCh2 = data.steps.filter(step => step.targetV60 === 2).map(s => ({startTimeSec: s.startTimeSec, addVolumeML: s.addVolumeML}));
                    }
                }
                renderSteps();
            } else {
                // Если слот пустой, даем умный шаблон
                document.getElementById('rec-name').value = isDouble ? "Новый 2 v 60" : "Новый V60";
                document.getElementById('rec-weight').value = isDouble ? 30 : 15;
                document.getElementById('rec-grind').value = isDouble ? "8.0" : "7.0";
                document.getElementById('rec-volume').value = 250;
                
                currentStepsCh1 = [{ startTimeSec: 0, addVolumeML: 50 }];
                if (isDouble) {
                    currentStepsCh2 = [{ startTimeSec: 20, addVolumeML: 50 }];
                }
                renderSteps();
            }
        }).catch(e => {
            alert("Ошибка загрузки: " + e.message);
            document.getElementById('rec-name').value = "";
        });
    }

    // Сохранение формы в Firebase
    function saveToFirebase() {
        syncStepsFromInputs(); 
        
        const path = document.getElementById('dbPath').value;
        const isDouble = path.includes('double');
        
        const name = document.getElementById('rec-name').value.trim();
        const weight = parseInt(document.getElementById('rec-weight').value) || 0;
        const grind = document.getElementById('rec-grind').value.trim() || "-";
        const totalVolume = parseInt(document.getElementById('rec-volume').value) || 0;

        if (name === "") {
            alert("Пожалуйста, введите название рецепта!");
            return;
        }

        // Собираем все шаги в один массив для отправки в базу
        let finalSteps = [];
        
        currentStepsCh1.forEach(s => {
            finalSteps.push({ startTimeSec: s.startTimeSec, addVolumeML: s.addVolumeML, targetV60: 1 });
        });
        
        if (isDouble) {
            currentStepsCh2.forEach(s => {
                finalSteps.push({ startTimeSec: s.startTimeSec, addVolumeML: s.addVolumeML, targetV60: 2 });
            });
        }
        
        if (finalSteps.length === 0) {
            alert("Добавьте хотя бы одно вливание!");
            return;
        }

        // Сортируем по времени (от 0 и дальше), как требует плата ESP32
        finalSteps.sort((a, b) => a.startTimeSec - b.startTimeSec);

        const dataToSave = {
            name: name,
            grind: grind,
            weight: weight,
            totalVolume: totalVolume,
            stepCount: finalSteps.length,
            steps: finalSteps
        };

        db.ref(path).set(dataToSave)
            .then(() => alert('Успешно сохранено!\nРецепт обновится на станции при следующей варке или перезагрузке.'))
            .catch(e => alert('Ошибка при сохранении: ' + e.message));
    }
</script>
</body>
</html>
